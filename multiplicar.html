<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Table - Neon Edition</title>
  <link rel="stylesheet" href="multiplicar.css">
</head>

<body id="body">

  <div class="stars"></div>

  <main class="container">
    <div class="input-group">
      <input type="number" id="inputTabla" placeholder="Ej: 5" min="1" max="100">
    </div>

    <button class="btn-probar" id="btnProbar">PROBAR</button>

    <div class="glass-card">
      <h1 id="titulo">Tabla del...</h1>
      <table id="tabla-multiplicar">
        <thead>
          <tr>
            <th>Operación</th>
            <th>Resultado</th>
          </tr>
        </thead>
        <tbody id="cuerpo-tabla">
        </tbody>
      </table>
    </div>
  </main>
  <footer class="main-footer">
    <a href="https://github.com/programador428-gif" target="_blank" class="logo-link">
      <img src="https://avatars.githubusercontent.com/u/230013094?v=4" alt="Logo Dilan" class="logo-img">
      <span class="author-name">Dilan Solorzano</span>
    </a>
  </footer>
  <script src="multiplicar.js"></script>
</body>

</html>
