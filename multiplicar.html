<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Table - Neon Edition</title>
  <link rel="stylesheet" href="multiplicar.css">
</head>

<body>

  <div class="stars"></div>

  <main class="container">
    <button class="btn-probar">PROBAR</button>

    <div class="glass-card">
      <h1>Tabla del 3</h1>
      <table>
        <thead>
          <tr>
            <th>Operación</th>
            <th>Resultado</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>3 × 1</td>
            <td>3</td>
          </tr>
          <tr>
            <td>3 × 2</td>
            <td>6</td>
          </tr>
          <tr>
            <td>3 × 3</td>
            <td>9</td>
          </tr>
          <tr>
            <td>3 × 4</td>
            <td>12</td>
          </tr>
          <tr>
            <td>3 × 5</td>
            <td>15</td>
          </tr>
          <tr>
            <td>3 × 6</td>
            <td>18</td>
          </tr>
          <tr>
            <td>3 × 7</td>
            <td>21</td>
          </tr>
          <tr>
            <td>3 × 8</td>
            <td>24</td>
          </tr>
          <tr>
            <td>3 × 9</td>
            <td>27</td>
          </tr>
          <tr>
            <td>3 × 10</td>
            <td>30</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
  <footer class="main-footer">
    <a href="https://github.com/programador428-gif" target="_blank" class="logo-link">
      <img src="https://avatars.githubusercontent.com/u/230013094?v=4" alt="Logo Dilan" class="logo-img">
      <span class="author-name">Dilan Solorzano</span>
    </a>
  </footer>
</body>

</html>
